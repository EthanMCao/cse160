<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Assignment 5</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: block; }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none;
    }

    #wow-note {
      position: absolute;
      bottom: 10px;
      right: 10px;
      color: white;
      font-size: 13px;
      max-width: 280px;
      pointer-events: none;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>

  <div id="info">
    Assignment 5 - Three.js Scene<br>
    Left-drag: orbit | Scroll: zoom | Right-drag: pan
  </div>

  <div id="wow-note">
    Wow: Day/night cycle - sun moves across the sky, lights shift from warm to cool, orbs glow brighter at night
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="main.js"></script>
</body>
</html>
